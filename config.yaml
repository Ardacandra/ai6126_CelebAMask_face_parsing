# CelebAMask Face Parsing Configuration

# Dataset paths
data:
  train:
    images: "data/train/images"
    masks: "data/train/masks"
  augmentation:
    use_train_aug: true
    train_aug:
      images: "data/train_aug/images"
      masks: "data/train_aug/masks"
  val:
    images: "data/val/images"

# Output directory
output:
  dir: "out"
  run_id: "srr_bsln_v4_aug_20_ep"

# Visualization settings
visualization:
  num_samples: 6
  dpi: 150
  figsize_width: 10
  figsize_height_per_sample: 3

# Model training settings
training:
  image_size: 512
  batch_size: 4
  num_epochs: 20
  learning_rate: 0.001
  scheduler:
    enabled: true
    type: "reduce_on_plateau"
    mode: "min"
    factor: 0.5
    patience: 5
    min_lr: 0.000001
  checkpoint_every: 10
  val_split: 0.1
  split_seed: 42
  patience: 20

# Model settings
model:
  name: "srresnet_baseline"
  num_classes: 19  # CelebAMask-HQ has 19 classes
  max_params: 1821085
  arch_configs:
    srresnet_baseline:
      num_residual_blocks: 16
      context_dilations: [2, 4, 8]
      decoder_channels: [64, 48, 32]