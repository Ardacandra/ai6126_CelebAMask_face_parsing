# CelebAMask Face Parsing Configuration

# Dataset paths
data:
  train:
    images: "data/train/images"
    masks: "data/train/masks"
  augmentation:
    use_train_aug: true
    train_aug:
      images: "data/train_aug/images"
      masks: "data/train_aug/masks"
  val:
    images: "data/val/images"

# Output directory
output:
  dir: "out"
  run_id: "lfp_v1"

# Visualization settings
visualization:
  num_samples: 6
  dpi: 150
  figsize_width: 10
  figsize_height_per_sample: 3

# Model training settings
training:
  image_size: 512
  batch_size: 4
  num_epochs: 30
  learning_rate: 0.001
  loss:
    name: "ce_dice_boundary"  # cross_entropy | dice | focal | boundary_aware | ce_dice_boundary
    ignore_index: null
    class_weights: null  # Set per-class weights here when using cross_entropy/focal/boundary_aware
    dice:
      smooth: 1.0
    focal:
      alpha: 0.75
      gamma: 2.5
    boundary_aware:
      ce_weight: 1.0
      boundary_weight: 2.0
      dilation: 5
    ce_dice_boundary:
      ce_weight: 1.0
      dice_weight: 1.0
      boundary_weight: 1.5
      dice_smooth: 1.0
      dilation: 5
  scheduler:
    enabled: true
    type: "reduce_on_plateau"
    mode: "min"
    factor: 0.5
    patience: 5
    min_lr: 0.000001
  checkpoint_every: 10
  val_split: 0.1
  split_seed: 42
  patience: 20

# Model settings
model:
  # name: "srresnet_baseline"
  name: "lite_face_parser"
  num_classes: 19  # CelebAMask-HQ has 19 classes
  max_params: 1821085
  arch_configs:
    lite_face_parser:
      stage_channels: [40, 64, 96, 144]
      expand_ratio: 4
      aspp_dilations: [1, 2, 4]
      aspp_channels: 96
    srresnet_baseline:
      num_residual_blocks: 16
      context_dilations: [2, 4, 8]
      decoder_channels: [64, 48, 32]